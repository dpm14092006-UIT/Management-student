services:
  postgres:
    image: postgres:16-alpine
    container_name: scis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scis
      POSTGRES_PASSWORD: scis_password
      POSTGRES_DB: scis
    ports:
      - "5432:5432"
    volumes:
      - scis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scis -d scis"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: scis-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - scis_redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  scis_pgdata:
  scis_redisdata:
